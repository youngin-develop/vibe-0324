<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영인이 생일파티! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
  <div class="background-decorations" aria-hidden="true">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="container">
    <header class="header">
      <div class="icon-wrap">✨ 🎂 ✨</div>
      <h1>영인이 생일파티에 온걸 환영해!</h1>
      <p class="subtitle">오늘은 영인이의 특별한 날이에요!</p>
    </header>
    
    <main class="interaction-card">
      <div class="button-group">
        <button id="fireworks-btn" class="party-btn confetti-btn">
          <span class="btn-icon">🎉</span>
          영인이 생일파티에 온걸 축하해
        </button>
        
        <button id="meat-party-btn" class="party-btn meat-btn">
          <span class="btn-icon">🥩</span>
          노원에서 고기파티
        </button>
      </div>

      <div id="message-container" class="message-container">
        <p id="special-message" class="special-text"></p>
      </div>
    </main>
    
    <!-- Disqus 댓글 섹션 -->
    <section class="comments-section">
      <h3>방명록에 축하 메시지를 남겨주세요! ✍️</h3>
      <div id="disqus_thread">
        <div style="text-align: center; padding: 2rem; color: var(--text-muted); font-family: 'Gaegu', cursive;">
          댓글창을 불러오고 있습니다... 🎈
        </div>
      </div>
      <script>
          var disqus_config = function () {
              this.page.url = window.location.href.split('?')[0]; // 쿼리 스트링 제외한 URL
              this.page.identifier = 'youngin-birthday-party'; // 고정 식별자 사용
          };
          (function() { 
              var d = document, s = d.createElement('script');
              s.src = 'https://ybyi.disqus.com/embed.js';
              s.setAttribute('data-timestamp', +new Date());
              (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <footer class="footer">
      <p>&copy; 2026 Young-in's Birthday Party. Made with ❤️</p>
    </footer>
  </div>
  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
