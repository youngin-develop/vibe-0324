<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE-Self | 자기계발 통합 솔루션</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>
    
    <div id="app">
        <header class="main-header">
            <div class="logo">VIBE-Self</div>
            <nav class="status-bar">
                <div class="progress-info">
                    <span class="label">종합 성장 지수:</span>
                    <span id="global-score">0%</span>
                </div>
                <div id="deficiency-badge" class="badge" hidden>결핍 항목 발견</div>
            </nav>
        </header>

        <main class="dashboard-container">
            <section class="hero">
                <h1>당신의 성장을 <span class="highlight">디자인</span>하세요</h1>
                <p>10가지 핵심 분야를 진단하고 부족한 부분을 AI와 함께 채워보세요.</p>
            </section>

            <div id="category-grid" class="category-grid">
                <!-- Web Components will be injected here -->
            </div>
        </main>

        <aside id="ai-consultant-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>AI 성장 컨설턴트</h2>
                <button id="close-sidebar" class="icon-btn">&times;</button>
            </div>
            <div id="ai-chat-container" class="chat-container">
                <div class="message system">
                    안녕하세요! 무엇을 도와드릴까요? 분야별 진단을 마치면 더 구체적인 조언을 드릴 수 있습니다.
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="ai-search-input" placeholder="성장 팁을 검색해보세요...">
                <button id="ai-search-btn">검색</button>
            </div>
        </aside>

        <button id="open-sidebar" class="fab">
            <span class="icon">✨</span>
            <span class="text">AI 검색</span>
        </button>
    </div>

    <template id="category-card-template">
        <style>
            :host {
                display: block;
                background: var(--card-bg);
                border-radius: 24px;
                padding: 24px;
                box-shadow: var(--shadow-deep);
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                cursor: pointer;
                position: relative;
                overflow: hidden;
            }
            :host(:hover) {
                transform: translateY(-8px);
                box-shadow: var(--shadow-glow);
            }
            .icon { font-size: 2rem; margin-bottom: 16px; }
            h3 { margin: 0 0 8px 0; font-size: 1.25rem; font-weight: 700; }
            .status { font-size: 0.9rem; color: var(--text-muted); }
            .progress-track {
                height: 4px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 2px;
                margin-top: 16px;
                position: relative;
            }
            .progress-fill {
                height: 100%;
                background: var(--accent-color);
                border-radius: 2px;
                transition: width 0.5s ease-out;
            }
            .deficiency-alert {
                position: absolute;
                top: 12px;
                right: 12px;
                background: oklch(60% 0.2 20);
                color: white;
                font-size: 0.7rem;
                padding: 4px 8px;
                border-radius: 12px;
                font-weight: 700;
            }
        </style>
        <div class="content">
            <div class="icon"></div>
            <h3></h3>
            <div class="status">진단 전</div>
            <div class="progress-track">
                <div class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </template>

    <div id="modal-container" class="modal-container" hidden>
        <!-- Assessment Modal Content -->
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
